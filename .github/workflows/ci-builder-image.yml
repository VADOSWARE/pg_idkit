name: ci-builder-image

description: |
  Build (and push) the CI builder image

on:
  workflow_dispatch:
    inputs:
      cargo-pgrx-version:
        required: false
        type: string
        default: "0.15.0"
        description: |
          version of cargo-pgrx to download (inside image build)

permissions:
  contents: none

jobs:
  builder-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        libc:
          - gnu
          - musl
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build builder image
        env:
          BUILDER_TYPE: ${{ matrix.libc }}
          BUILDER_IMAGE_ARG_CARGO_PGRX_VERSION: ${{ inputs.cargo-pgrx-version }}
        run: |
          just build-builder-image

      - name: Push builder image
        env:
          BUILDER_TYPE: ${{ matrix.libc }}
        run: |
          just push-builder-image
